<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            background: linear-gradient(to right, #2869bd, #4e9cbb, rgb(103, 245, 198));
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(0,0,0,0.3);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
        }
        h2 {
            margin-bottom: 1rem;
        }
        form {
            margin-bottom: 1.5rem;
        }
        input[type="text"] {
            padding: 10px;
            border-radius: 6px;
            border: none;
            width: 70%;
            margin-right: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #06e65c;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #04b84a;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: rgba(255,255,255,0.2);
            margin: 5px 0;
            padding: 8px;
            border-radius: 6px;
        }
        a {
            display: inline-block;
            margin-top: 1rem;
            color: #06e65c;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome {{ name }} 🎉</h2>
        <form method="POST">
            <input type="text" name="request" placeholder="Enter your request" required>
            <button type="submit">Submit Request</button>
        </form>

        <h3>Your service request:</h3>
        <ul>
            {% for r in requests %}
                <li>{{ r }}</li>
            {% endfor %}
        </ul>

        <a href="/logout">Logout</a>
    </div>
</body>
</html>
